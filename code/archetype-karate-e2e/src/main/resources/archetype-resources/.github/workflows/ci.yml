name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ['21']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build service module
        if: ${{ hashFiles('code/pom.xml') != '' }}
        working-directory: code
        run: mvn -B clean verify

      - name: Build Karate E2E module
        working-directory: e2e/karate
        run: mvn -B clean verify -Dkarate.options="--tags ~@local"

      - name: Upload Karate reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports-java-${{ matrix.java-version }}
          path: |
            e2e/karate/target/karate-reports/**
            e2e/karate/target/cucumber-html-reports/**
          if-no-files-found: ignore
