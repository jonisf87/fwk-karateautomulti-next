name: Publish Antora Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docs dependencies
        working-directory: code/docs
        run: npm ci

      - name: Bundle Antora UI
        working-directory: code/docs
        run: npm run ui:bundle

      - name: Build Antora site
        working-directory: code/docs
        run: npm run build:prod

      - name: Prepare GitHub Pages output
        working-directory: code/docs/build/site
        shell: bash
        run: touch .nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: code/docs/build/site
